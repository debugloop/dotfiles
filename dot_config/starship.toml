format = """$all"""
right_format = """$memory_usage$battery"""

# right hand side (conditional)
[[battery.display]]
threshold = 10
style = 'bold bright-red'

[memory_usage]
disabled = false
threshold = 60
symbol = 'ï،ڑ'
style = 'bold bright-red'
format = '[$symbol ${ram}( | ${swap})]($style)'

# left hand side
[username]
format = '[$user]($style)'
style_user = 'bright-green'
show_always = true

[hostname]
format = '@[$hostname]($style)'
style = 'none'
ssh_only = true

[directory]
format = ' [$path]($style)[$read_only]($read_only_style) '
repo_root_format = ' [$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = false
style = 'green'
before_repo_root_style = 'green'
repo_root_style = 'bold green'
read_only = 'âœ–'

[git_branch]
format = '\([$symbol$branch(:$remote_branch)]($style)'
symbol = ""
style = "purple"

[git_commit]
format = '\([$hash$tag]($style) '
tag_disabled = false
style = "purple"

[git_status]
format = '[$conflicted$deleted$renamed](red)[$modified](blue)[$staged](yellow)[$untracked$stashed](bright-black)[$ahead_behind](bold)\) '
style = 'bright-black'
ahead = ' â†‘$count'
behind = ' â†“$count'
diverged = ' â†‘$ahead_countâ†“$behind_count'
conflicted = 'î¬؛$count'
deleted = ' âœ–$count'
modified = ' âœڑ$count'
renamed = ' آ»$count'
staged = ' â—ڈ$count'
stashed = ' âœ±$count'
untracked = ' â€¦$count'

[status]
disabled = false
pipestatus = true
format = '[$status $common_meaning$signal_name]($style)'

# language runtimes
[golang]
format = '[$symbol($version )]($style)'
symbol = "îک§ "

[lua]
format = '[$symbol($version )]($style)'
symbol = "îک  "

[nix_shell]
format = '[$symbol$state( \($name\))]($style)'
symbol = "ïŒ“ "

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "îˆµ "
